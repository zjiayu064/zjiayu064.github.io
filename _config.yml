# Site Settings
title                    : "Jiayu Zhao"
description              : "M.Sc. Student in Microelectronics at USTC · Visiting Graduate Student at NTU · Research: LLMs for EDA, Efficient LLM Inference, MoE Compression"
repository               : "zjiayu064/zjiayu064.github.io"

# SEO Related
google_site_verification :  # get google_site_verification from https://search.google.com/search-console/about
bing_site_verification   :  # get bing_site_verification from https://www.bing.com/webmasters/about
baidu_site_verification  :  # get baidu_site_verification from https://ziyuan.baidu.com/login/index?u=/site/index

# Site Author
author:
  name             : "Jiayu Zhao"
  avatar           : "images/avatar.jpg"
  bio              : "M.Sc. @ USTC · Visiting @ NTU"
  affiliation:
    - "Master student"
    - "School of Microelectronics"
    - "USTC"
  affiliation_url  : "http://sme.ustc.edu.cn/"
  location         : "Anhui, China / Singapore"
  address          : "99 South Jinzhai Rd., Anhui, China"
  email            : "jiayz@mail.ustc.edu.cn"
  googlescholar    : "https://scholar.google.com/citations?user=ttJ0zcEAAAAJ"
  github           : "zjiayu064"  # [PLACEHOLDER] Replace with your GitHub username


# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - docs
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jemoji


# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
